name: publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:smoke
      - name: Verify tag and publish to npm
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version v${version}." >&2
            exit 1
          fi

          dist_tag=latest
          if [[ "${version}" == *-* ]]; then
            prerelease=${version#*-}
            dist_tag=${prerelease%%.*}
          fi

          npm publish --access public --provenance --tag "${dist_tag}"
